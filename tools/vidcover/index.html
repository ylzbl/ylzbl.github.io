<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频封面生成器</title>
    <style>
        /* 本地字体加载 - 支持多种字重 */
        @font-face { font-family: 'AliPuHui'; src: url('./AliPuHui-Regular.woff2') format('woff2'), url('./AliPuHui-Regular.woff') format('woff'), url('./AliPuHui-Regular.ttf') format('truetype'), url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2'); font-weight: normal; font-display: swap; }
        @font-face { font-family: 'AliPuHui'; src: url('./AliPuHui-Bold.woff2') format('woff2'), url('./AliPuHui-Bold.woff') format('woff'), url('./AliPuHui-Bold.ttf') format('truetype'), url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2'); font-weight: bold; font-display: swap; }
        @font-face { font-family: 'AliPuHui'; src: url('./AliPuHui-Light.woff2') format('woff2'), url('./AliPuHui-Light.woff') format('woff'), url('./AliPuHui-Light.ttf') format('truetype'), url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2'); font-weight: 300; font-display: swap; }
        @font-face { font-family: 'AliPuHui'; src: url('./AliPuHui-Medium.woff2') format('woff2'), url('./AliPuHui-Medium.woff') format('woff'), url('./AliPuHui-Medium.ttf') format('truetype'), url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2'); font-weight: 500; font-display: swap; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* 统一页面字体定义 */
        body, input, textarea, button, label { font-family: 'AliPuHui', sans-serif; }
        body { background: #f5f5f5; padding: 10px; }

        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; align-items: flex-start; }
        .controls { min-width: 300px; background: white; padding: 20px; border-radius: 8px; flex: 1; }
        .preview { flex: 1; display: flex; justify-content: center; }
        .canvas-container { background: white; padding: 20px; border-radius: 8px; transition: all 0.3s ease; }
        canvas { border: 1px solid #ddd; border-radius: 4px; max-width: 100%; height: auto; background: transparent; }

        /* 透明模式下的网格背景 */
        .canvas-container.transparent-mode {
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .control-group input[type="text"], .control-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .control-group textarea { resize: vertical; }

        /* 统一按钮样式 */
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 10px; margin-bottom: 10px; transition: background 0.2s; }
        .btn:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-sm { padding: 5px 10px; font-size: 12px; margin-top: 10px; }

        .scale-info { font-size: 12px; color: #666; margin-top: 10px; padding: 8px; background: #f8f9fa; border-radius: 4px; }
        .main-title { text-align: center; color: #333; margin-bottom: 20px; font-size: 24px; }
        
        /* 统一提示框样式 */
        .tip { background: #e3f2fd; border-left: 4px solid #2196f3; padding: 10px; margin-bottom: 20px; font-size: 12px; line-height: 1.5; color: #333; }
        .warning-banner { background: #ffeb3b; color: #000; padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; font-size: 13px; font-weight: bold; display: none; text-align: center; }

        /* 单选按钮统一样式 */
        .cover-type-selector { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #dee2e6; }
        .cover-type-selector label.title { font-weight: bold; color: #495057; display: block; margin-bottom: 10px; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 15px; }
        .radio-option { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: background-color 0.2s; }
        .radio-option:hover { background-color: #e9ecef; }
        .radio-option input[type="radio"], .radio-option label { margin: 0; cursor: pointer; font-weight: normal; color: #495057; }

        /* 上传区域统一样式 */
        .image-upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; background: #fafafa; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .image-upload-area:hover, .image-upload-area.dragover { border-color: #007bff; background: #e3f2fd; }
        .image-upload-area.dragover { transform: scale(1.02); }
        .upload-icon { font-size: 48px; color: #999; margin-bottom: 10px; }
        .upload-text { color: #666; margin-bottom: 5px; }
        .upload-hint { font-size: 12px; color: #999; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .image-info { margin-top: 10px; padding: 8px; background: #e8f5e8; border-radius: 4px; font-size: 12px; color: #2d5a2d; display: none; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .preview { order: -1; width: 100%; } /* 移动端预览优先 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1 class="main-title">视频封面生成器</h1>
            
            <div class="cover-type-selector">
                <label class="title">封面类型：</label>
                <div class="radio-group">
                    <div class="radio-option"><input type="radio" id="wechat" name="coverType" value="wechat" checked onchange="changeCoverType()"><label for="wechat">微信视频号封面 (1080x1448)</label></div>
                    <div class="radio-option"><input type="radio" id="bilibili" name="coverType" value="bilibili" onchange="changeCoverType()"><label for="bilibili">B站视频封面 (1920x1080)</label></div>
                    <div class="radio-option"><input type="radio" id="vertical" name="coverType" value="vertical" onchange="changeCoverType()"><label for="vertical">竖屏短标题 (1080x1920)</label></div>
                    <div class="radio-option"><input type="radio" id="credits" name="coverType" value="credits" onchange="changeCoverType()"><label for="credits">竖屏Credits (1080x1920)</label></div>
                </div>
            </div>

            <div class="tip">
                请将bg.jpg、logo.png、search.jpg放在本页面同文件夹下。<br>
                将阿里巴巴普惠体字体文件放在同一目录下，可优先使用本地字体。<br>
                如遇跨域问题，会尝试网络备用资源。<br>
                每行文字限制：9中文字/18英文字，最多13/26字符（超宽或超高时会缩放）。<br>
                微信文章气泡截图，默认最大宽度430px，高度240px。
            </div>

            <!-- 标准图上传区 -->
            <div class="control-group" id="imageUploadGroup">
                <label>图片上传：</label>
                <div class="image-upload-area" id="imageUploadArea">
                    <div class="upload-icon">📷</div><div class="upload-text">点击或拖拽图片到此处</div><div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
                    <input type="file" class="file-input" id="imageFile" accept="image/*">
                </div>
                <div id="imageInfo" class="image-info"></div>
            </div>

            <!-- Credits专属气泡上传区 -->
            <div class="control-group" id="creditsImageUploadGroup" style="display: none;">
                <label>上传微信文章气泡截图：</label>
                <div class="image-upload-area" id="creditsImageUploadArea">
                    <div class="upload-icon">📷</div><div class="upload-text">点击或拖拽气泡截图到此处</div><div class="upload-hint">支持 JPG、PNG 格式</div>
                    <input type="file" class="file-input" id="creditsImageFile" accept="image/*">
                </div>
                <div id="creditsImageInfo" class="image-info"></div>
                <button class="btn btn-secondary btn-sm" onclick="resetCreditsImage()">重置气泡</button>
            </div>

            <!-- 标准单行文本输入区 -->
            <div id="standardTextInputs">
                <div class="control-group"><label>上方文字（黄底黑字）：</label><input type="text" id="topText" placeholder="请输入上方文字" maxlength="26" oninput="updateText()"></div>
                <div class="control-group"><label>下方文字（黑底白字）：</label><input type="text" id="bottomText" placeholder="请输入下方文字" maxlength="26" oninput="updateText()"></div>
                <div id="warningBanner" class="warning-banner">注意短标题输入字数不要过多（一般不超过10字）</div>
                <div class="scale-info" id="scaleInfo">当前缩放: 100%</div>
            </div>

            <!-- Credits多行文本输入区 -->
            <div id="creditsTextInputs" style="display: none;">
                <div class="control-group"><label>Credits文字区1：</label><textarea id="creditsTopText" rows="2" oninput="updateText()">搜索标题看全文
秒懂更多深度信息</textarea></div>
                <div class="control-group"><label>Credits文字区2：</label><textarea id="creditsBottomText" rows="6" oninput="updateText()">记者：小娱
制作：James
监制：吴立湘

2026.3.22</textarea></div>
            </div>

            <button class="btn" onclick="downloadImage()">下载封面图片</button>
            <button class="btn btn-secondary" onclick="resetAll()">重置所有</button>
        </div>

        <div class="preview">
            <div class="canvas-container">
                <canvas id="canvas" width="1080" height="1448"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let contentImage = null; 
        let creditsContentImage = null; 
        let currentCoverType = 'wechat';
        
        const coverConfigs = {
            wechat: { width: 1080, height: 1448 },
            bilibili: { width: 1920, height: 1080 },
            vertical: { width: 1080, height: 1920 },
            credits: { width: 1080, height: 1920 }
        };

        // 统一资源管理
        const assets = {
            bg: { img: new Image(), src: './bg.jpg', fb: 'https://images.weserv.nl/?url=https://ylzbl.github.io/tools/vidcover/bg.jpg' },
            logo: { img: new Image(), src: './logo.png', fb: 'https://images.weserv.nl/?url=https://ylzbl.github.io/tools/vidcover/logo.png' },
            wm: { img: new Image(), src: './watermark.png', fb: 'https://images.weserv.nl/?url=https://ylzbl.github.io/tools/vidcover/watermark.png' },
            search: { img: new Image(), src: './search.jpg', fb: 'https://images.weserv.nl/?url=https://ylzbl.github.io/tools/vidcover/search.jpg' }
        };

        function loadBaseImages() {
            let loaded = 0;
            const checkDone = () => { if (++loaded >= 4) drawCanvas(); };
            
            Object.values(assets).forEach(asset => {
                asset.img.crossOrigin = 'anonymous';
                asset.img.onload = checkDone;
                asset.img.onerror = checkDone;
                asset.img.src = asset.src;
                
                // 网络降级容错
                setTimeout(() => {
                    if (!asset.img.complete || asset.img.naturalWidth === 0) {
                        asset.img.onload = drawCanvas;
                        asset.img.src = asset.fb;
                    }
                }, 1000);
            });
        }

        function saveState() {
            const state = {
                coverType: currentCoverType,
                topText: document.getElementById('topText').value,
                bottomText: document.getElementById('bottomText').value,
                creditsTopText: document.getElementById('creditsTopText').value,
                creditsBottomText: document.getElementById('creditsBottomText').value,
                contentImageData: contentImage ? contentImage.src : null,
                creditsContentImageData: creditsContentImage ? creditsContentImage.src : null
            };
            try { localStorage.setItem('vidcover_state', JSON.stringify(state)); } 
            catch (e) {
                state.contentImageData = state.creditsContentImageData = null;
                try { localStorage.setItem('vidcover_state', JSON.stringify(state)); } catch(e2) {}
            }
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('vidcover_state');
                if (saved) {
                    const state = JSON.parse(saved);
                    if (state.coverType) {
                        const radio = document.querySelector(`input[name="coverType"][value="${state.coverType}"]`);
                        if (radio) radio.checked = true;
                        currentCoverType = state.coverType;
                    }
                    ['topText', 'bottomText', 'creditsTopText', 'creditsBottomText'].forEach(id => {
                        if (state[id] !== undefined) document.getElementById(id).value = state[id];
                    });
                    if (state.contentImageData) {
                        contentImage = new Image(); contentImage.crossOrigin = 'anonymous';
                        contentImage.onload = drawCanvas; contentImage.src = state.contentImageData;
                    }
                    if (state.creditsContentImageData) {
                        creditsContentImage = new Image(); creditsContentImage.crossOrigin = 'anonymous';
                        creditsContentImage.onload = drawCanvas; creditsContentImage.src = state.creditsContentImageData;
                    }
                }
            } catch (e) {}
        }

        function changeCoverType() {
            currentCoverType = document.querySelector('input[name="coverType"]:checked').value;
            const isVert = currentCoverType === 'vertical';
            const isCred = currentCoverType === 'credits';

            document.getElementById('imageUploadGroup').style.display = (isVert || isCred) ? 'none' : 'block';
            document.getElementById('creditsImageUploadGroup').style.display = isCred ? 'block' : 'none';
            document.getElementById('standardTextInputs').style.display = isCred ? 'none' : 'block';
            document.getElementById('creditsTextInputs').style.display = isCred ? 'block' : 'none';
            
            saveState();
            drawCanvas();
        }

        function setupImageUpload() {
            bindUploadEvents('imageUploadArea', 'imageFile', 'imageInfo', false);
            bindUploadEvents('creditsImageUploadArea', 'creditsImageFile', 'creditsImageInfo', true);
        }

        function bindUploadEvents(areaId, inputId, infoId, isCredits) {
            const uploadArea = document.getElementById(areaId);
            const fileInput = document.getElementById(inputId);
            if (!uploadArea || !fileInput) return;

            const newUploadArea = uploadArea.cloneNode(true);
            uploadArea.parentNode.replaceChild(newUploadArea, uploadArea);
            const newFileInput = document.getElementById(inputId);

            newUploadArea.addEventListener('click', () => newFileInput.click());
            newFileInput.addEventListener('change', (e) => handleFile(e.target.files[0], areaId, inputId, infoId, isCredits));

            ['dragover', 'dragleave', 'drop'].forEach(evt => {
                newUploadArea.addEventListener(evt, e => {
                    e.preventDefault();
                    if (evt === 'dragover') newUploadArea.classList.add('dragover');
                    else newUploadArea.classList.remove('dragover');
                    
                    if (evt === 'drop' && e.dataTransfer.files.length > 0) {
                        const file = e.dataTransfer.files[0];
                        if (file.type.startsWith('image/')) handleFile(file, areaId, inputId, infoId, isCredits);
                        else alert('请选择图片文件！');
                    }
                });
            });
        }

        function handleFile(file, areaId, inputId, infoId, isCredits) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    if (isCredits) creditsContentImage = img; else contentImage = img;
                    saveState(); drawCanvas();
                };
                img.src = e.target.result;
                
                document.getElementById(infoId).innerHTML = `<strong>已上传：</strong>${file.name}<br><strong>大小：</strong>${(file.size/1024/1024).toFixed(2)} MB`;
                document.getElementById(infoId).style.display = 'block';
                
                const uploadArea = document.getElementById(areaId);
                uploadArea.innerHTML = `<div class="upload-icon">✅</div><div class="upload-text">图片已上传</div><div class="upload-hint">点击重新选择图片</div><input type="file" class="file-input" id="${inputId}" accept="image/*">`;
                bindUploadEvents(areaId, inputId, infoId, isCredits);
            };
            reader.readAsDataURL(file);
        }

        function resetCreditsImage() {
            creditsContentImage = null;
            document.getElementById('creditsImageUploadArea').innerHTML = `<div class="upload-icon">📷</div><div class="upload-text">已恢复默认气泡</div><div class="upload-hint">点击或拖拽新气泡截图到此处</div><input type="file" class="file-input" id="creditsImageFile" accept="image/*">`;
            document.getElementById('creditsImageInfo').style.display = 'none';
            bindUploadEvents('creditsImageUploadArea', 'creditsImageFile', 'creditsImageInfo', true);
            updateText();
        }

        function countCharacters(text) {
            const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            return { effectiveWidth: chineseChars * 2 + (text.length - chineseChars) };
        }

        function updateText() {
            saveState();
            if(currentCoverType === 'credits') { drawCanvas(); return; }

            const topText = document.getElementById('topText').value;
            const bottomText = document.getElementById('bottomText').value;
            const maxW = Math.max(countCharacters(topText).effectiveWidth, countCharacters(bottomText).effectiveWidth);
            const scale = maxW > 18 ? Math.max(0.5, 18 / maxW) : 1;
            
            document.getElementById('scaleInfo').textContent = `当前缩放: ${Math.round(scale * 100)}% (最宽行: ${maxW}字符宽度)`;
            document.getElementById('warningBanner').style.display = (topText.length + bottomText.length > 10) ? 'block' : 'none';
            drawCanvas();
        }

        // ============================================
        // 渲染通用组件
        // ============================================
        function drawBgAndLogo(yOffset = 0, isCredits = false) {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#FF8C69'); gradient.addColorStop(1, '#FFE4B5');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (assets.bg.img.complete && assets.bg.img.naturalWidth > 0) {
                ctx.drawImage(assets.bg.img, 0, 0, canvas.width, canvas.height);
            }
            
            let logoH = 0;
            if (assets.logo.img.complete && assets.logo.img.naturalWidth > 0) {
                const logoW = isCredits ? 380 : canvas.width * 0.4;
                logoH = (assets.logo.img.naturalHeight / assets.logo.img.naturalWidth) * logoW;
                ctx.drawImage(assets.logo.img, (canvas.width - logoW) / 2, yOffset, logoW, logoH);
            }
            return logoH;
        }

        function drawImageArea(img, x, y, w, h, fallbackText, fontSize = 32) {
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.save(); ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
                const imgAspect = img.naturalWidth / img.naturalHeight;
                const areaAspect = w / h;
                let drawW = w, drawH = h, drawX = x, drawY = y;
                if (imgAspect > areaAspect) { drawW = h * imgAspect; drawX = x + (w - drawW) / 2; } 
                else { drawH = w / imgAspect; drawY = y + (h - drawH) / 2; }
                ctx.drawImage(img, drawX, drawY, drawW, drawH);
                ctx.restore();
            } else {
                ctx.fillStyle = '#e0e0e0'; ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#999'; ctx.font = `${fontSize}px 'AliPuHui', sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(fallbackText, x + w / 2, y + h / 2);
            }
        }

        function drawTitleBox(text, y, fontSize, maxTextWidth, isTop, padding, borderWidth) {
            if (!text) return 0;
            ctx.font = `bold ${fontSize}px 'AliPuHui', sans-serif`;
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            
            const textWidth = Math.min(ctx.measureText(text).width, maxTextWidth);
            const boxHeight = fontSize * 1.2 + padding * 2;
            const boxWidth = textWidth + padding * 2;
            const topX = (canvas.width - textWidth) / 2;
            const boxX = topX - padding;
            
            if (isTop) {
                ctx.fillStyle = '#FFA349'; ctx.fillRect(boxX, y, boxWidth, boxHeight);
                ctx.fillStyle = '#FFFFFF'; ctx.fillRect(boxX, y, borderWidth, boxHeight); ctx.fillRect(boxX, y, boxWidth, borderWidth);
                ctx.fillStyle = '#000000'; ctx.fillText(text, topX, y + boxHeight / 2);
            } else {
                ctx.fillStyle = '#000000'; ctx.fillRect(boxX, y, boxWidth, boxHeight);
                ctx.fillStyle = '#FFA349'; ctx.fillRect(boxX + boxWidth - borderWidth, y, borderWidth, boxHeight); ctx.fillRect(boxX, y + boxHeight - borderWidth, boxWidth, borderWidth);
                ctx.fillStyle = '#FFFFFF'; ctx.fillText(text, topX, y + boxHeight / 2);
            }
            return boxHeight;
        }

        function drawCombinedTitles(baseY, isBilibili) {
            const topText = document.getElementById('topText').value;
            const bottomText = document.getElementById('bottomText').value;
            if (!topText && !bottomText) return;

            const maxW = Math.max(countCharacters(topText).effectiveWidth, countCharacters(bottomText).effectiveWidth);
            let scale = maxW > 18 ? Math.max(0.5, 18 / maxW) : 1;
            let fontSize = 85 * scale;
            let padding = isBilibili ? 25 : 15;
            let borderWidth = isBilibili ? 12 : 10;
            let maxTextWidth = canvas.width * (isBilibili ? 0.85 : 0.8);
            
            if (isBilibili) {
                fontSize = 110; ctx.font = `bold ${fontSize}px 'AliPuHui', sans-serif`;
                const maxWBotTop = Math.max(topText ? ctx.measureText(topText).width : 0, bottomText ? ctx.measureText(bottomText).width : 0);
                if (maxWBotTop + padding * 2 > maxTextWidth) fontSize = fontSize * (maxTextWidth - padding * 2) / maxWBotTop;
                
                let linesCount = (topText ? 1 : 0) + (bottomText ? 1 : 0);
                if (linesCount > 0 && linesCount * (fontSize * 1.2 + padding * 2) > canvas.height / 3) {
                    fontSize = (canvas.height / 3 / linesCount - padding * 2) / 1.2;
                }
                baseY = canvas.height - 100 - linesCount * (fontSize * 1.2 + padding * 2);
            } else {
                baseY -= padding; // Pixel offset match for original layout
            }

            let currentY = baseY;
            if (topText) currentY += drawTitleBox(topText, currentY, fontSize, maxTextWidth, true, padding, borderWidth);
            if (bottomText) currentY += drawTitleBox(bottomText, currentY, fontSize, maxTextWidth, false, padding, borderWidth);
        }

        // ============================================
        // 路由渲染绘制
        // ============================================
        function drawCanvas() {
            const config = coverConfigs[currentCoverType];
            const canvasContainer = document.querySelector('.canvas-container');
            canvas.width = config.width; canvas.height = config.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (currentCoverType === 'vertical') {
                canvasContainer.classList.add('transparent-mode');
                if (assets.wm.img.complete && assets.wm.img.naturalWidth > 0) {
                    const wmWidth = canvas.width * 0.6; 
                    const wmHeight = wmWidth * (assets.wm.img.naturalHeight / assets.wm.img.naturalWidth); 
                    ctx.drawImage(assets.wm.img, (canvas.width - wmWidth) / 2, (canvas.height - wmHeight) / 2, wmWidth, wmHeight);
                }
                drawCombinedTitles(canvas.width * 0.2, false);
            } else {
                canvas.style.background = 'white';
                canvasContainer.classList.remove('transparent-mode');
                
                if (currentCoverType === 'wechat') {
                    const logoH = drawBgAndLogo(canvas.height * 0.1);
                    const imgY = logoH > 0 ? (canvas.height * 0.12 + logoH + 40) : (canvas.height * 0.2);
                    const imgH = canvas.width * 9 / 16;
                    drawImageArea(contentImage, 0, imgY, canvas.width, imgH, '点击上传图片');
                    const textStartY = (logoH > 0 ? (canvas.height * 0.2 + logoH) : (canvas.height * 0.2)) + imgH + 60;
                    drawCombinedTitles(textStartY, false);
                } 
                else if (currentCoverType === 'bilibili') {
                    drawBgAndLogo(-9999); // Draw only BG
                    drawImageArea(contentImage, 0, 0, canvas.width, canvas.height, '点击上传图片', 48);
                    drawCombinedTitles(0, true);
                } 
                else if (currentCoverType === 'credits') {
                    let currentY = canvas.width * 0.2;
                    currentY += drawBgAndLogo(currentY, true) + 70;

                    const drawTextCentered = (linesStr, fontSize, lineH) => {
                        const lines = linesStr ? linesStr.split('\n') : [];
                        ctx.fillStyle = '#000000'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                        ctx.font = `normal ${fontSize}px 'AliPuHui', sans-serif`;
                        lines.forEach((line, i) => ctx.fillText(line, canvas.width / 2, currentY + i * lineH));
                        currentY += lines.length * lineH + 70;
                    };

                    drawTextCentered(document.getElementById('creditsTopText').value, 45, 70);

                    let imgToDraw = (creditsContentImage && creditsContentImage.complete) ? creditsContentImage : (assets.search.img.complete && assets.search.img.naturalWidth > 0 ? assets.search.img : null);
                    let drawImgW = 430, drawImgH = 240;
                    if (imgToDraw) {
                        const scale = Math.min(430 / imgToDraw.naturalWidth, 240 / imgToDraw.naturalHeight);
                        drawImgW = imgToDraw.naturalWidth * scale; drawImgH = imgToDraw.naturalHeight * scale;
                        ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowOffsetX = ctx.shadowOffsetY = 12; ctx.shadowBlur = 20;
                        ctx.drawImage(imgToDraw, (canvas.width - drawImgW) / 2, currentY, drawImgW, drawImgH);
                        ctx.shadowColor = 'transparent'; ctx.shadowOffsetX = ctx.shadowOffsetY = ctx.shadowBlur = 0;
                    } else {
                        ctx.fillStyle = '#f0f0f0'; ctx.fillRect((canvas.width - drawImgW) / 2, currentY, drawImgW, drawImgH);
                        ctx.fillStyle = '#999'; ctx.font = `normal 24px 'AliPuHui', sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText('缺少气泡截图', canvas.width / 2, currentY + drawImgH / 2 - 12);
                    }
                    currentY += drawImgH + 70;
                    drawTextCentered(document.getElementById('creditsBottomText').value, 40, 60);
                }
            }
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = `${document.querySelector('label[for="'+currentCoverType+'"]').textContent.split(' ')[0]}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function resetAll() {
            document.getElementById('topText').value = '';
            document.getElementById('bottomText').value = '';
            document.getElementById('creditsTopText').value = "搜索标题看全文\n秒懂更多深度信息";
            document.getElementById('creditsBottomText').value = "记者：小娱\n制作：James\n监制：吴立湘\n\n2026.3.22";
            
            contentImage = creditsContentImage = null;
            
            document.getElementById('imageUploadArea').innerHTML = `<div class="upload-icon">📷</div><div class="upload-text">点击或拖拽图片到此处</div><div class="upload-hint">支持 JPG、PNG、GIF 格式</div><input type="file" class="file-input" id="imageFile" accept="image/*">`;
            document.getElementById('imageInfo').style.display = 'none';
            document.getElementById('creditsImageUploadArea').innerHTML = `<div class="upload-icon">📷</div><div class="upload-text">点击或拖拽气泡截图到此处</div><div class="upload-hint">支持 JPG、PNG 格式</div><input type="file" class="file-input" id="creditsImageFile" accept="image/*">`;
            document.getElementById('creditsImageInfo').style.display = 'none';
            
            setupImageUpload(); updateText(); drawCanvas();
        }

        loadState(); loadBaseImages(); setupImageUpload(); changeCoverType();
        if (document.fonts) document.fonts.ready.then(drawCanvas);
    </script>
</body>
</html>
