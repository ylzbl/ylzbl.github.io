<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频封面生成器</title>
    <style>
        /* 本地字体加载 - 支持多种字重 */
        @font-face {
            font-family: 'AliPuHui';
            src: url('./AliPuHui-Regular.woff2') format('woff2'),
                 url('./AliPuHui-Regular.woff') format('woff'),
                 url('./AliPuHui-Regular.ttf') format('truetype'),
                 url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'AliPuHui';
            src: url('./AliPuHui-Bold.woff2') format('woff2'),
                 url('./AliPuHui-Bold.woff') format('woff'),
                 url('./AliPuHui-Bold.ttf') format('truetype'),
                 url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2');
            font-weight: bold;
            font-display: swap;
        }

        @font-face {
            font-family: 'AliPuHui';
            src: url('./AliPuHui-Light.woff2') format('woff2'),
                 url('./AliPuHui-Light.woff') format('woff'),
                 url('./AliPuHui-Light.ttf') format('truetype'),
                 url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'AliPuHui';
            src: url('./AliPuHui-Medium.woff2') format('woff2'),
                 url('./AliPuHui-Medium.woff') format('woff'),
                 url('./AliPuHui-Medium.ttf') format('truetype'),
                 url('https://cdn.jsdelivr.net/gh/IlysvlVEizbr/via-font@0.3/AliPuHui.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'AliPuHui', sans-serif;
            background: #f5f5f5;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .controls {
            min-width: 300px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
        }

        .preview {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .canvas-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        canvas {
            border: 1px solid #ddd;
            border-radius: 4px;
            max-width: 100%;
            height: auto;
            background: transparent; /* 确保画布背景透明 */
        }

        /* 透明模式下的网格背景 */
        .canvas-container.transparent-mode {
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .control-group input[type="text"],
        .control-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .control-group textarea {
            resize: vertical;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #1e7e34;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }

        .char-count {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .scale-info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
        }

        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }

        .main-title {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .tip {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.4;
        }

        /* 字数超限警告横幅 */
        .warning-banner {
            background: #ffeb3b;
            color: #000;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: bold;
            display: none;
            text-align: center;
        }

        /* 单选按钮样式 */
        .cover-type-selector {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .cover-type-selector label {
            font-weight: bold;
            color: #495057;
            margin-bottom: 10px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .radio-option:hover {
            background-color: #e9ecef;
        }

        .radio-option input[type="radio"] {
            margin: 0;
        }

        .radio-option label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
            color: #495057;
        }

        /* 图片上传区域样式 */
        .image-upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: #fafafa;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .image-upload-area:hover {
            border-color: #007bff;
            background: #f0f8ff;
        }

        .image-upload-area.dragover {
            border-color: #007bff;
            background: #e3f2fd;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            color: #999;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
        }

        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .image-info {
            margin-top: 10px;
            padding: 8px;
            background: #e8f5e8;
            border-radius: 4px;
            font-size: 12px;
            color: #2d5a2d;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .container {
                flex-direction: column;
                gap: 15px;
            }
            
            .controls {
                min-width: auto;
                width: 100%;
            }
            
            .preview {
                width: 100%;
                order: 2;
            }
            
            .canvas-container {
                padding: 10px;
            }
            
            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
            
            .main-title {
                font-size: 20px;
                margin-bottom: 15px;
            }
            
            .upload-icon {
                font-size: 36px;
            }
            
            .image-upload-area {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 18px;
            }
            
            .btn {
                width: 100%;
                margin-right: 0;
                margin-bottom: 10px;
            }
            
            .radio-option {
                padding: 6px 8px;
            }
            
            .radio-option label {
                font-size: 13px;
            }
            
            .upload-icon {
                font-size: 32px;
            }
            
            .image-upload-area {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1 class="main-title">视频封面生成器</h1>
            
            <div class="cover-type-selector">
                <label>封面类型：</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="wechat" name="coverType" value="wechat" checked onchange="changeCoverType()">
                        <label for="wechat">微信视频号封面 (1080x1448)</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="bilibili" name="coverType" value="bilibili" onchange="changeCoverType()">
                        <label for="bilibili">B站视频封面 (1920x1080)</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="vertical" name="coverType" value="vertical" onchange="changeCoverType()">
                        <label for="vertical">竖屏短标题 (透明底PNG)</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="credits" name="coverType" value="credits" onchange="changeCoverType()">
                        <label for="credits">Credits竖屏 (1080x1920)</label>
                    </div>
                </div>
            </div>

            <div class="tip" id="tipText">
                请将bg.jpg和logo.png放在同一文件夹下。<br>
                Logo显示为画布宽度40%，上下边距20%，图片填满画布宽度。<br>
                每行文字限制：中文9字/英文18字符（无缩放），最多13字/26字符（会缩放）。<br>
                <small>如遇跨域问题，应用会自动尝试网络备用图片。</small><br>
                <small>支持本地字体：将阿里巴巴普惠体字体文件放在同一目录下可优先使用本地字体。</small>
            </div>

            <!-- 标准类型的图片上传区 -->
            <div class="control-group" id="imageUploadGroup">
                <label>图片上传：</label>
                <div class="image-upload-area" id="imageUploadArea">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击或拖拽图片到此处</div>
                    <div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
                    <input type="file" class="file-input" id="imageFile" accept="image/*">
                </div>
                <div id="imageInfo" class="image-info" style="display: none;"></div>
            </div>

            <!-- Credits类型的图片上传区 (专属) -->
            <div class="control-group" id="creditsImageUploadGroup" style="display: none;">
                <label>图片上传 (微信文章气泡截图)：</label>
                <div class="image-upload-area" id="creditsImageUploadArea">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击或拖拽气泡截图到此处</div>
                    <div class="upload-hint">支持 JPG、PNG 格式</div>
                    <input type="file" class="file-input" id="creditsImageFile" accept="image/*">
                </div>
                <div id="creditsImageInfo" class="image-info" style="display: none;"></div>
                <button class="btn btn-secondary" style="margin-top: 10px; font-size: 12px; padding: 5px 10px;" onclick="resetCreditsImage()">恢复默认气泡截图</button>
            </div>

            <!-- 标准类型的单行文本输入区 -->
            <div id="standardTextInputs">
                <div class="control-group" id="topTextGroup">
                    <label id="topTextLabel">上方文字（黄底黑字）：</label>
                    <input type="text" id="topText" placeholder="请输入上方文字" maxlength="26" oninput="updateText()">
                </div>

                <div class="control-group" id="bottomTextGroup">
                    <label id="bottomTextLabel">下方文字（黑底白字）：</label>
                    <input type="text" id="bottomText" placeholder="请输入下方文字" maxlength="26" oninput="updateText()">
                </div>

                <!-- 字数超限警告横幅 -->
                <div id="warningBanner" class="warning-banner">
                    注意短标题输入字数不要过多（一般不超过10字）
                </div>

                <div class="scale-info" id="scaleInfo">
                    当前缩放: 100%
                </div>
            </div>

            <!-- Credits类型的多行文本输入区 -->
            <div id="creditsTextInputs" style="display: none;">
                <div class="control-group">
                    <label>第一行文字（常规体 居中）：</label>
                    <textarea id="creditsTopText" rows="2" oninput="updateText()">搜索标题看全文
秒懂更多深度信息</textarea>
                </div>

                <div class="control-group">
                    <label>第二行文字（常规体 居中）：</label>
                    <textarea id="creditsBottomText" rows="6" oninput="updateText()">记者：小娱
制作：James
监制：吴立湘

2026.3.22</textarea>
                </div>
            </div>

            <button class="btn btn-success" onclick="downloadImage()">下载封面图片</button>
            <button class="btn" onclick="resetAll()">重置所有</button>
        </div>

        <div class="preview">
            <div class="canvas-container">
                <canvas id="canvas" width="1080" height="1448"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let bgImage = new Image();
        let logoImage = new Image();
        let watermarkImage = new Image();
        let searchImage = new Image(); // 专属气泡默认截图
        
        let contentImage = null; // 用于标准视频封面的图片
        let creditsContentImage = null; // 用于Credits界面的专属上传图片
        
        let imagesLoaded = 0;
        let currentCoverType = 'wechat';
        
        // 封面类型配置
        const coverConfigs = {
            wechat: {
                width: 1080,
                height: 1448,
                showLogo: true,
                showBackground: true,
                textLayout: 'vertical'
            },
            bilibili: {
                width: 1920,
                height: 1080,
                showLogo: false,
                showBackground: true,
                textLayout: 'vertical'
            },
            vertical: {
                width: 1080,
                height: 1920, // 固定高度为1920
                showLogo: false,
                showBackground: false,
                transparentBackground: true,
                textLayout: 'vertical'
            },
            credits: {
                width: 1080,
                height: 1920,
                showLogo: true,
                showBackground: true,
                textLayout: 'credits'
            }
        };

        // LocalStorage 持久化存储
        function saveState() {
            const state = {
                coverType: currentCoverType,
                topText: document.getElementById('topText').value,
                bottomText: document.getElementById('bottomText').value,
                creditsTopText: document.getElementById('creditsTopText').value,
                creditsBottomText: document.getElementById('creditsBottomText').value,
                contentImageData: contentImage ? contentImage.src : null,
                creditsContentImageData: creditsContentImage ? creditsContentImage.src : null
            };
            try {
                localStorage.setItem('vidcover_state', JSON.stringify(state));
            } catch (e) {
                console.warn('保存状态失败(可能是图片尺寸过大限制):', e);
                // 降级保存：仅保存文本和类型
                state.contentImageData = null;
                state.creditsContentImageData = null;
                try {
                    localStorage.setItem('vidcover_state', JSON.stringify(state));
                } catch(e2) {}
            }
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('vidcover_state');
                if (saved) {
                    const state = JSON.parse(saved);
                    
                    if (state.coverType) {
                        const radio = document.querySelector(`input[name="coverType"][value="${state.coverType}"]`);
                        if (radio) radio.checked = true;
                        currentCoverType = state.coverType;
                    }
                    if (state.topText !== undefined) document.getElementById('topText').value = state.topText;
                    if (state.bottomText !== undefined) document.getElementById('bottomText').value = state.bottomText;
                    if (state.creditsTopText !== undefined) document.getElementById('creditsTopText').value = state.creditsTopText;
                    if (state.creditsBottomText !== undefined) document.getElementById('creditsBottomText').value = state.creditsBottomText;
                    
                    if (state.contentImageData) {
                        loadImageFromSrc(state.contentImageData, false);
                    }
                    if (state.creditsContentImageData) {
                        loadCreditsImageFromSrc(state.creditsContentImageData, false);
                    }
                }
            } catch (e) {
                console.error('读取存储状态失败:', e);
            }
        }

        // 切换封面类型
        function changeCoverType() {
            const selectedRadio = document.querySelector('input[name="coverType"]:checked');
            currentCoverType = selectedRadio.value;
            const config = coverConfigs[currentCoverType];
            
            // 更新画布尺寸
            canvas.width = config.width;
            if (config.height > 0) {
                canvas.height = config.height;
            }
            
            // 更新提示文字
            updateTipText();
            updateTextLabels();
            
            // 控制面板区域显示隐藏
            const imageUploadGroup = document.getElementById('imageUploadGroup');
            const creditsImageUploadGroup = document.getElementById('creditsImageUploadGroup');
            const standardTextInputs = document.getElementById('standardTextInputs');
            const creditsTextInputs = document.getElementById('creditsTextInputs');

            if (currentCoverType === 'vertical') {
                imageUploadGroup.style.display = 'none';
                creditsImageUploadGroup.style.display = 'none';
                standardTextInputs.style.display = 'block';
                creditsTextInputs.style.display = 'none';
            } else if (currentCoverType === 'credits') {
                imageUploadGroup.style.display = 'none';
                creditsImageUploadGroup.style.display = 'block';
                standardTextInputs.style.display = 'none';
                creditsTextInputs.style.display = 'block';
            } else {
                imageUploadGroup.style.display = 'block';
                creditsImageUploadGroup.style.display = 'none';
                standardTextInputs.style.display = 'block';
                creditsTextInputs.style.display = 'none';
            }
            
            saveState();
            // 重新绘制
            drawCanvas();
        }

        function updateTipText() {
            const tipElement = document.getElementById('tipText');
            if (currentCoverType === 'wechat') {
                tipElement.innerHTML = `
                    请将bg.jpg和logo.png放在同一文件夹下。<br>
                    Logo显示为画布宽度40%，上下边距20%，图片填满画布宽度。<br>
                    每行文字限制：中文9字/英文18字符（无缩放），最多13字/26字符（会缩放）。<br>
                    <small>如遇跨域问题，应用会自动尝试网络备用图片。</small><br>
                    <small>支持本地字体：将阿里巴巴普惠体字体文件放在同一目录下可优先使用本地字体。</small>
                `;
            } else if (currentCoverType === 'bilibili') {
                tipElement.innerHTML = `
                    B站封面尺寸1920x1080，不显示logo。<br>
                    文字布局为上下两行组合，位于底部，总高度不超过封面1/3。<br>
                    每行文字限制：超宽或超高时会自动缩放。<br>
                    <small>如遇跨域问题，应用会自动尝试网络备用图片。</small><br>
                    <small>支持本地字体：将阿里巴巴普惠体字体文件放在同一目录下可优先使用本地字体。</small>
                `;
            } else if (currentCoverType === 'vertical') {
                tipElement.innerHTML = `
                    竖屏短标题：生成透明背景PNG (1080x1920)。<br>
                    画面中心自动添加水印，文字默认固定在顶部居中。<br>
                    上方文字：黄底黑字，白边框<br>
                    下方文字：黑底白字，黄边框<br>
                    用于叠加到视频内部遮罩层。<br>
                    <small>每行文字限制：中文9字/英文18字符（无缩放），最多13字/26字符（会缩放）。</small>
                `;
            } else if (currentCoverType === 'credits') {
                tipElement.innerHTML = `
                    Credits竖屏：包含背景、顶部Logo、气泡截图及多行文字排版 (1080x1920)。<br>
                    内容统一从画面顶部向下排版。<br>
                    中部可以上传【微信文章气泡截图】，默认最大宽度430px，高度240px，自带右下角45度阴影。<br>
                    第一行与第二行文字允许自定义并支持多行折行，排版水平居中。<br>
                    <small>支持本地字体：将阿里巴巴普惠体字体文件放在同一目录下可优先使用本地字体。</small>
                `;
            }
        }

        function updateTextLabels() {
            const topLabel = document.getElementById('topTextLabel');
            const bottomLabel = document.getElementById('bottomTextLabel');
            
            topLabel.textContent = '上方文字（黄底黑字）：';
            bottomLabel.textContent = '下方文字（黑底白字）：';
        }
        
        // 预加载所有背景、logo、水印及专属气泡图
        function loadBaseImages() {
            bgImage.crossOrigin = 'anonymous';
            logoImage.crossOrigin = 'anonymous';
            watermarkImage.crossOrigin = 'anonymous';
            searchImage.crossOrigin = 'anonymous';
            
            const checkDone = () => {
                imagesLoaded++;
                if (imagesLoaded >= 4) { // 必须加载完4张图（包括失败跳过）
                    drawCanvas();
                }
            };
            
            bgImage.onload = checkDone;
            logoImage.onload = checkDone;
            watermarkImage.onload = checkDone;
            searchImage.onload = checkDone;
            
            bgImage.onerror = () => { console.log('背景图片加载失败'); checkDone(); };
            logoImage.onerror = () => { console.log('Logo图片加载失败'); checkDone(); };
            watermarkImage.onerror = () => { console.log('水印图片加载失败'); checkDone(); };
            searchImage.onerror = () => { console.log('默认气泡图片加载失败，等待尝试Fallback...'); checkDone(); };
            
            // 尝试加载本地文件，如果失败则使用网络备用方案
            bgImage.src = './bg.jpg';
            logoImage.src = './logo.png';

        // ============================================
        // 图片上传和拖拽功能 (支持多个上传区)
        // ============================================
        function setupImageUpload() {
            bindUploadEvents('imageUploadArea', 'imageFile', 'imageInfo', false);
            bindUploadEvents('creditsImageUploadArea', 'creditsImageFile', 'creditsImageInfo', true);
        }

        function bindUploadEvents(areaId, inputId, infoId, isCredits) {
            const uploadArea = document.getElementById(areaId);
            const fileInput = document.getElementById(inputId);

            if (!uploadArea || !fileInput) return;

            // 清除旧事件
            const newUploadArea = uploadArea.cloneNode(true);
            uploadArea.parentNode.replaceChild(newUploadArea, uploadArea);
            const newFileInput = document.getElementById(inputId);

            // 点击上传
            newUploadArea.addEventListener('click', () => {
                newFileInput.click();
            });

            // 文件选择
            newFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleFile(file, areaId, inputId, infoId, isCredits);
            });

            // 拖拽功能
            newUploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                newUploadArea.classList.add('dragover');
            });

            newUploadArea.addEventListener('dragleave', (e) => {
                e.preventDefault();
                newUploadArea.classList.remove('dragover');
            });

            newUploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                newUploadArea.classList.remove('dragover');
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (file.type.startsWith('image/')) {
                        handleFile(file, areaId, inputId, infoId, isCredits);
                    } else {
                        alert('请选择图片文件！');
                    }
                }
            });
        }

        function handleFile(file, areaId, inputId, infoId, isCredits) {
            const reader = new FileReader();
            reader.onload = function(e) {
                if (isCredits) {
                    loadCreditsImageFromSrc(e.target.result);
                } else {
                    loadImageFromSrc(e.target.result);
                }
                
                // 显示图片信息
                const imageInfo = document.getElementById(infoId);
                const fileSize = (file.size / 1024 / 1024).toFixed(2);
                imageInfo.innerHTML = `
                    <strong>已上传：</strong>${file.name}<br>
                    <strong>大小：</strong>${fileSize} MB
                `;
                imageInfo.style.display = 'block';
                
                // 更新上传区域显示
                const uploadArea = document.getElementById(areaId);
                uploadArea.innerHTML = `
                    <div class="upload-icon">✅</div>
                    <div class="upload-text">图片已上传</div>
                    <div class="upload-hint">点击重新选择图片</div>
                    <input type="file" class="file-input" id="${inputId}" accept="image/*">
                `;
                
                // 重新绑定事件
                bindUploadEvents(areaId, inputId, infoId, isCredits);
            };
            reader.readAsDataURL(file);
        }

        // 计算字符数和类型
        function countCharacters(text) {
            const chineseRegex = /[\u4e00-\u9fa5]/g;
            const chineseChars = (text.match(chineseRegex) || []).length;
            const totalChars = text.length;
            const englishChars = totalChars - chineseChars;
            
            // 中文字符按2个字符计算宽度
            const effectiveWidth = chineseChars * 2 + englishChars;
            
            return {
                total: totalChars,
                chinese: chineseChars,
                english: englishChars,
                effectiveWidth: effectiveWidth
            };
        }

        // 更新字符计数和缩放信息
        function updateText() {
            saveState();

            // Credits类型不需要这套标准验证和警告
            if(currentCoverType === 'credits') {
                drawCanvas();
                return;
            }

            const topText = document.getElementById('topText').value;
            const bottomText = document.getElementById('bottomText').value;
            
            const topStats = countCharacters(topText);
            const bottomStats = countCharacters(bottomText);
            
            // 计算缩放比例
            const maxWidth = Math.max(topStats.effectiveWidth, bottomStats.effectiveWidth);
            let scale = 1;
            
            if (maxWidth > 18) {
                scale = Math.max(0.5, 18 / maxWidth);
            }
            
            document.getElementById('scaleInfo').textContent = 
                `当前缩放: ${Math.round(scale * 100)}% (最宽行: ${maxWidth}字符宽度)`;
            
            // 检查标题字数限制并显示警告
            checkTitleLength(topText.length, bottomText.length);
            
            drawCanvas();
        }

        // 检查标题字数限制
        function checkTitleLength(topLength, bottomLength) {
            const warningBanner = document.getElementById('warningBanner');
            
            // 检查是否需要显示警告（两行总字符数>=10）
            const totalLength = topLength + bottomLength;
            
            if (totalLength > 10) {
                warningBanner.style.display = 'block';
            } else {
                warningBanner.style.display = 'none';
            }
        }

        // 绘制画布路由
        function drawCanvas() {
            const config = coverConfigs[currentCoverType];
            const canvasContainer = document.querySelector('.canvas-container');
            
            if (currentCoverType === 'vertical') {
                // 透明背景
                canvasContainer.classList.add('transparent-mode');
                
                // 绘制竖屏短标题 (1080x1920)
                drawVerticalShortTitle();
            } else {
                // 其他类型有背景
                canvas.style.background = 'white';
                canvasContainer.classList.remove('transparent-mode');
                canvas.width = config.width;
                canvas.height = config.height;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (currentCoverType === 'wechat') {
                    drawWechatCover();
                } else if (currentCoverType === 'bilibili') {
                    drawBilibiliCover();
                } else if (currentCoverType === 'credits') {
                    drawCreditsCover();
                }
            }
        }

        // ============================================
        // 1. 微信视频号封面
        // ============================================
        function drawWechatCover() {
            // 绘制背景 - 先绘制渐变作为缺省，再叠加bg.jpg
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#FF8C69');
            gradient.addColorStop(1, '#FFE4B5');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (bgImage.complete && bgImage.naturalWidth > 0) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            }
            
            // 绘制logo - 宽度为画布40%，上下边距为画布20%
            if (logoImage.complete && logoImage.naturalWidth > 0) {
                const logoWidth = canvas.width * 0.4;
                const logoHeight = (logoImage.naturalHeight / logoImage.naturalWidth) * logoWidth;
                const logoX = (canvas.width - logoWidth) / 2;
                const logoY = canvas.height * 0.1;
                ctx.drawImage(logoImage, logoX, logoY, logoWidth, logoHeight);
            }
            
            let logoBottomY = canvas.height * 0.2;
            if (logoImage.complete && logoImage.naturalWidth > 0) {
                const logoWidth = canvas.width * 0.4;
                const logoHeight = (logoImage.naturalHeight / logoImage.naturalWidth) * logoWidth;
                logoBottomY = canvas.height * 0.12 + logoHeight + 40; 
            }

            const imageAreaX = 0;
            const imageAreaY = logoBottomY;
            const imageAreaWidth = canvas.width;
            const imageAreaHeight = imageAreaWidth * 9 / 16; 
            
            if (contentImage && contentImage.complete) {
                ctx.save();
                ctx.beginPath();
                ctx.rect(imageAreaX, imageAreaY, imageAreaWidth, imageAreaHeight);
                ctx.clip();
                
                const imgAspect = contentImage.naturalWidth / contentImage.naturalHeight;
                const areaAspect = imageAreaWidth / imageAreaHeight;
                
                let drawWidth, drawHeight, drawX, drawY;
                
                if (imgAspect > areaAspect) {
                    drawHeight = imageAreaHeight;
                    drawWidth = drawHeight * imgAspect;
                    drawX = imageAreaX + (imageAreaWidth - drawWidth) / 2;
                    drawY = imageAreaY;
                } else {
                    drawWidth = imageAreaWidth;
                    drawHeight = drawWidth / imgAspect;
                    drawX = imageAreaX;
                    drawY = imageAreaY + (imageAreaHeight - drawHeight) / 2;
                }
                
                ctx.drawImage(contentImage, drawX, drawY, drawWidth, drawHeight);
                ctx.restore();
            } else {
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(imageAreaX, imageAreaY, imageAreaWidth, imageAreaHeight);
                ctx.fillStyle = '#999';
                ctx.font = `32px 'AliPuHui', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('点击上传图片', imageAreaX + imageAreaWidth / 2, imageAreaY + imageAreaHeight / 2);
            }

            drawWechatTextBoxes();
        }

        // ============================================
        // 3. 竖屏短标题 (全屏透明水印)
        // ============================================
        function drawVerticalShortTitle() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (watermarkImage.complete && watermarkImage.naturalWidth > 0) {
                const wmWidth = canvas.width * 0.6; 
                const wmHeight = wmWidth * (watermarkImage.naturalHeight / watermarkImage.naturalWidth); 
                
                const wmX = (canvas.width - wmWidth) / 2;
                const wmY = (canvas.height - wmHeight) / 2;
                
                ctx.drawImage(watermarkImage, wmX, wmY, wmWidth, wmHeight);
            }
            
            const topText = document.getElementById('topText').value;
            const bottomText = document.getElementById('bottomText').value;
            
            if (!topText && !bottomText) return;
            
            const topStats = countCharacters(topText);
            const bottomStats = countCharacters(bottomText);
            const maxWidth = Math.max(topStats.effectiveWidth, bottomStats.effectiveWidth);
            let scale = 1;
            
            if (maxWidth > 18) {
                scale = Math.max(0.5, 18 / maxWidth);
            }
            
            const baseFontSize = 85 * scale;
            const maxTextWidth = canvas.width * 0.8; 
            
            ctx.font = `bold ${baseFontSize}px 'AliPuHui', sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            
            const borderWidth = 10;
            const padding = 15;
            
            let topTextWidth = 0, topTextHeight = 0;
            let bottomTextWidth = 0, bottomTextHeight = 0;
            
            if (topText) {
                topTextWidth = Math.min(ctx.measureText(topText).width, maxTextWidth);
                topTextHeight = baseFontSize * 1.2;
            }
            if (bottomText) {
                bottomTextWidth = Math.min(ctx.measureText(bottomText).width, maxTextWidth);
                bottomTextHeight = baseFontSize * 1.2;
            }
            
            let currentY = canvas.width * 0.2; 
            
            if (topText) {
                const topX = (canvas.width - topTextWidth) / 2;
                const boxX = topX - padding;
                const boxY = currentY;
                const boxWidth = topTextWidth + padding * 2;
                const boxHeight = topTextHeight + padding * 2;
                
                ctx.fillStyle = '#FFA349';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(boxX, boxY, borderWidth, boxHeight);
                ctx.fillRect(boxX, boxY, boxWidth, borderWidth);
                ctx.fillStyle = '#000000';
                ctx.fillText(topText, topX, boxY + boxHeight / 2);
                
                currentY += boxHeight; 
            }
            
            if (bottomText) {
                const bottomX = (canvas.width - bottomTextWidth) / 2;
                const boxX = bottomX - padding;
                const boxY = currentY;
                const boxWidth = bottomTextWidth + padding * 2;
                const boxHeight = bottomTextHeight + padding * 2;
                
                ctx.fillStyle = '#000000';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                ctx.fillStyle = '#FFA349';
                ctx.fillRect(boxX + boxWidth - borderWidth, boxY, borderWidth, boxHeight);
                ctx.fillRect(boxX, boxY + boxHeight - borderWidth, boxWidth, borderWidth);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(bottomText, bottomX, boxY + boxHeight / 2);
            }
        }

        // ============================================
        // 4. Credits竖屏 
        // ============================================
        function drawCreditsCover() {
            // 背景底图和渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#FF8C69');
            gradient.addColorStop(1, '#FFE4B5');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (bgImage.complete && bgImage.naturalWidth > 0) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            }

            // 获取Credits对应的文本值并按换行拆分
            const topTextStr = document.getElementById('creditsTopText').value;
            const bottomTextStr = document.getElementById('creditsBottomText').value;
            const topLines = topTextStr ? topTextStr.split('\n') : [];
            const bottomLines = bottomTextStr ? bottomTextStr.split('\n') : [];

            // 文字行高设定 (明确指定使用常规体 AliPuHui regular)
            const topFontSize = 45;
            const topFontLineHeight = 70;
            const topTextH = topLines.length * topFontLineHeight;

            const bottomFontSize = 40;
            const bottomFontLineHeight = 60;

            // 版块间隔距离
            const gapLogoText = 70;
            const gapTextImg = 70;
            const gapImgText = 70;

            // Y轴起始位置：保证画面顶端对齐，设定为宽度20% (与竖屏短标题一致)
            let currentY = canvas.width * 0.2; 

            // 1. 绘制顶部 Logo
            const logoW = 380; // 和微信大致保持一定视觉比例
            let logoH = 100; // 缺省高度
            if (logoImage.complete && logoImage.naturalWidth > 0) {
                logoH = (logoImage.naturalHeight / logoImage.naturalWidth) * logoW;
                const logoX = (canvas.width - logoW) / 2;
                ctx.drawImage(logoImage, logoX, currentY, logoW, logoH);
            }
            currentY += logoH + gapLogoText;

            // 2. 绘制第一行自定义文字 (常规体居中)
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.font = `normal ${topFontSize}px 'AliPuHui', sans-serif`;
            
            for (let i = 0; i < topLines.length; i++) {
                ctx.fillText(topLines[i], canvas.width / 2, currentY + i * topFontLineHeight);
            }
            currentY += topTextH + gapTextImg;

            // 3. 绘制专属气泡图片及阴影
            let imgToDraw = null;
            if (creditsContentImage && creditsContentImage.complete) {
                imgToDraw = creditsContentImage;
            } else if (searchImage && searchImage.complete && searchImage.naturalWidth > 0) {
                imgToDraw = searchImage;
            }

            let drawImgW = 430; // 限制最大宽高度
            let drawImgH = 240;
            
            if (imgToDraw) {
                const scale = Math.min(430 / imgToDraw.naturalWidth, 240 / imgToDraw.naturalHeight);
                drawImgW = imgToDraw.naturalWidth * scale;
                drawImgH = imgToDraw.naturalHeight * scale;
                
                const imgX = (canvas.width - drawImgW) / 2;
                
                // 开启45度右下角阴影
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowOffsetX = 12;
                ctx.shadowOffsetY = 12;
                ctx.shadowBlur = 20;
                
                ctx.drawImage(imgToDraw, imgX, currentY, drawImgW, drawImgH);
                
                // 恢复阴影状态防止影响之后绘制的文本
                ctx.shadowColor = 'transparent';
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.shadowBlur = 0;
            } else {
                const imgX = (canvas.width - drawImgW) / 2;
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(imgX, currentY, drawImgW, drawImgH);
                ctx.fillStyle = '#999';
                ctx.font = `normal 24px 'AliPuHui', sans-serif`;
                ctx.fillText('缺少气泡截图', canvas.width / 2, currentY + drawImgH / 2 - 12);
            }
            currentY += drawImgH + gapImgText;

            // 4. 绘制第二行自定义文字 (常规体居中)
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.font = `normal ${bottomFontSize}px 'AliPuHui', sans-serif`;
            
            for (let i = 0; i < bottomLines.length; i++) {
                ctx.fillText(bottomLines[i], canvas.width / 2, currentY + i * bottomFontLineHeight);
            }
        }

        function drawBilibiliTextBoxes() {
            const topText = document.getElementById('topText').value;
            const bottomText = document.getElementById('bottomText').value;
            if (!topText && !bottomText) return;
            
            const maxTextWidth = canvas.width * 0.85; 
            const maxHeight = canvas.height / 3;      
            const padding = 25;
            const borderWidth = 12;
            
            let fontSize = 110;
            ctx.font = `bold ${fontSize}px 'AliPuHui', sans-serif`;
            
            let topTextWidth = topText ? ctx.measureText(topText).width : 0;
            let bottomTextWidth = bottomText ? ctx.measureText(bottomText).width : 0;
            let currentMaxWidth = Math.max(topTextWidth, bottomTextWidth);
            
            if (currentMaxWidth + padding * 2 > maxTextWidth) {
                fontSize = fontSize * (maxTextWidth - padding * 2) / currentMaxWidth;
            }
            
            let linesCount = (topText ? 1 : 0) + (bottomText ? 1 : 0);
            if (linesCount > 0) {
                let expectedTotalHeight = linesCount * (fontSize * 1.2 + padding * 2);
                if (expectedTotalHeight > maxHeight) {
                    fontSize = (maxHeight / linesCount - padding * 2) / 1.2;
                }
            }
            
            ctx.font = `bold ${fontSize}px 'AliPuHui', sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            
            let topTextHeight = fontSize * 1.2;
            let bottomTextHeight = fontSize * 1.2;
            
            topTextWidth = topText ? ctx.measureText(topText).width : 0;
            bottomTextWidth = bottomText ? ctx.measureText(bottomText).width : 0;
            
            const totalHeight = (topText ? topTextHeight + padding * 2 : 0) + 
                               (bottomText ? bottomTextHeight + padding * 2 : 0);
                               
            const marginBottom = 100; 
            let currentY = canvas.height - marginBottom - totalHeight;
            
            if (topText) {
                const topX = (canvas.width - topTextWidth) / 2;
                const boxX = topX - padding;
                const boxY = currentY;
                const boxWidth = topTextWidth + padding * 2;
                const boxHeight = topTextHeight + padding * 2;
                
                ctx.fillStyle = '#FFA349';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(boxX, boxY, borderWidth, boxHeight);
                ctx.fillRect(boxX, boxY, boxWidth, borderWidth);
                ctx.fillStyle = '#000000';
                ctx.fillText(topText, topX, boxY + boxHeight / 2);
                currentY += boxHeight; 
            }
            
            if (bottomText) {
                const bottomX = (canvas.width - bottomTextWidth) / 2;
                const boxX = bottomX - padding;
                const boxY = currentY;
                const boxWidth = bottomTextWidth + padding * 2;
                const boxHeight = bottomTextHeight + padding * 2;
                
                ctx.fillStyle = '#000000';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                ctx.fillStyle = '#FFA349';
                ctx.fillRect(boxX + boxWidth - borderWidth, boxY, borderWidth, boxHeight);
                ctx.fillRect(boxX, boxY + boxHeight - borderWidth, boxWidth, borderWidth);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(bottomText, bottomX, boxY + boxHeight / 2);
            }
        }

        // ============================================
        // 核心功能：下载和重置
        // ============================================
        function downloadImage() {
            const link = document.createElement('a');
            let fileName = '';
            
            if (currentCoverType === 'wechat') fileName = '微信视频号封面';
            else if (currentCoverType === 'bilibili') fileName = 'B站视频封面';
            else if (currentCoverType === 'credits') fileName = 'Credits竖屏';
            else fileName = '竖屏短标题-透明底';
            
            link.download = `${fileName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function resetAll() {
            // 重置标准单行文本
            document.getElementById('topText').value = '';
            document.getElementById('bottomText').value = '';
            
            // 重置Credits特有多行文本
            document.getElementById('creditsTopText').value = "搜索标题看全文\n秒懂更多深度信息";
            document.getElementById('creditsBottomText').value = "记者：小娱\n制作：James\n监制：吴立湘\n\n2026.3.22";
            
            // 清理缓存图片数据
            contentImage = null;
            creditsContentImage = null;
            
            // 重置标准上传区域
            const uploadArea = document.getElementById('imageUploadArea');
            uploadArea.innerHTML = `
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击或拖拽图片到此处</div>
                <div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
                <input type="file" class="file-input" id="imageFile" accept="image/*">
            `;
            document.getElementById('imageInfo').style.display = 'none';

            // 重置Credits专属上传区域
            const creditsUploadArea = document.getElementById('creditsImageUploadArea');
            creditsUploadArea.innerHTML = `
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击或拖拽气泡截图到此处</div>
                <div class="upload-hint">支持 JPG、PNG 格式</div>
                <input type="file" class="file-input" id="creditsImageFile" accept="image/*">
            `;
            document.getElementById('creditsImageInfo').style.display = 'none';
            
            document.getElementById('warningBanner').style.display = 'none';
            
            // 重新绑定两个上传区的事件
            setupImageUpload();
            
            updateText();
            drawCanvas();
        }

        // ============================================
        // 初始化运行流程
        // ============================================
        loadState();           // 1. 优先恢复上次用户存储的数据及 UI 设置
        loadBaseImages();      // 2. 加载缺省/内置图片 (自带重绘)
        setupImageUpload();    // 3. 绑定拖拽和点击上传事件
        changeCoverType();     // 4. 将 UI 切到设定的状态 (自带重绘)
        updateTextLabels();

        // 5. 监听字体加载完成后强制再次重绘，防止首次渲染Fallback成微软雅黑
        if (document.fonts) {
            document.fonts.ready.then(function() {
                drawCanvas();
            });
        }
    </script>
</body>
